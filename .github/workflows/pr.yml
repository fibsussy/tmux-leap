name: Build to test PR

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install system dependencies
        run: pacman -Syu --noconfirm base-devel git rust
      - uses: actions/checkout@v4
      - name: Build binary
        run: cargo build --release
      - name: Create tarball
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_NAME="x86_64"
          elif [ "$ARCH" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          fi
          mv target/release/tmux-leap tmux-leap
          tar -czf tmux-leap-linux-${ARCH_NAME}.tar.gz tmux-leap
      - name: Generate checksum
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_NAME="x86_64"
          elif [ "$ARCH" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          fi
          sha256sum tmux-leap-linux-${ARCH_NAME}.tar.gz > tmux-leap-linux-${ARCH_NAME}.sha256
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tmux-leap-linux
          path: |
            tmux-leap-linux-*.tar.gz
            tmux-leap-linux-*.sha256
